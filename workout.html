<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GlowUp | 운동</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">



<header class="hero">

<span>

</span>


</div>


</header>





<section class="card">


<h2>🔥 상체 운동</h2>

<input type="checkbox">

<span>

3세트 × 15회
</span>

</label>



<label class="todo">

<input type="checkbox">

<span>

<br>

</label>



<label class="todo">

<input type="checkbox">

<span>

3세트 × 12회
</span>

</label>



</section>







<section class="card">


<h2>🦵 하체 운동</h2>



<label class="todo">

<input type="checkbox">

<span>
🏃 스쿼트
<br>
4세트 × 20회
</span>

</label>



<label class="todo">

<input type="checkbox">

<span>
🦵 런지
<br>
3세트 × 15회
</span>

</label>



</section>







<section class="card">


<h2>🔥 코어 운동</h2>



<label class="todo">

<input type="checkbox">

<span>
⏱ 플랭크

3세트 × 60초
</span>

</label>



<label class="todo">

<input type="checkbox">

<span>
🔥 크런치
<br>
3세트 × 20회
</span>

</label>



</section>








<section class="card">


<h2>📊 오늘 기록</h2>


<div class="stats">


<div>

<h3>완료</h3>

<p id="done">
0개
</p>


</div>


<div>

<h3>총 운동</h3>

<p>
7개
</p>


</div>


<div>

<h3>XP</h3>

<p>
+50
</p>


</div>


</div>


</section>







<section class="card">


<h2>📝 나만의 운동</h2>


<input 
class="input"
placeholder="운동 이름 입력"
>


<input 
class="input"
placeholder="세트 × 횟수"
>


<button>
추가하기
</button>



</section>







<footer>

✨ GlowUp Workout

</footer>



</div>

</body>


</html>
